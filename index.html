<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>❤️</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden; /* ☆ 스크롤 방지 */
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #fff7fa;
      color: #111;
    }

    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      touch-action: none; /* ☆ 시스템 스크롤/확대 방지 */
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      text-align: center;
      z-index: 10; /* ☆ 문구가 버튼보다 뒤에 있도록 설정 */
      pointer-events: none; /* ☆ 문구 영역이 터치를 가로막지 않도록 설정 */
    }

    .wrap * {
      pointer-events: auto; /* ☆ 텍스트 안의 요소는 클릭 가능하게 */
    }

    .name {
      font-size: clamp(24px, 7vw, 36px);
      font-weight: 700;
      margin-bottom: 10px;
      color: #ff4d8d;
    }

    .love {
      font-size: clamp(20px, 6vw, 28px);
      font-weight: 600;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .love .heart {
      display: inline-block;
      animation: beat 1.2s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .question {
      font-size: clamp(28px, 8vw, 40px);
      font-weight: 800;
      margin-bottom: 40px;
    }

    /* ☆ 버튼 영역 스타일 수정 */
    .buttons-container {
      position: relative;
      width: 100%;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .btn {
      border: none;
      border-radius: 20px;
      padding: 16px 30px;
      min-width: 120px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    #yesBtn {
      background: #ff4d8d;
      color: #fff;
      z-index: 100; /* ☆ YES 버튼이 항상 위에 있도록 */
    }

    #noBtn {
      background: #fff;
      color: #666;
      border: 1px solid #eee;
      position: absolute; /* ☆ 자유롭게 움직이도록 설정 */
      transition: all 0.15s ease-out; /* ☆ 움직임 부드럽게 */
    }

    #result {
      margin-top: 30px;
      font-size: 32px;
      font-weight: 800;
      color: #ff4d8d;
      min-height: 40px;
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: fall linear forwards;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="name">지혜야 ❤️</div>
    <div class="love">많이 많이 사랑해</div>
    <div class="question">나랑 계속 만나줄래?</div>

    <div class="buttons-container" id="playground">
      <button class="btn" id="yesBtn">당연하지!</button>
      <button class="btn" id="noBtn">아니?</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const result = document.getElementById("result");
    const playground = document.getElementById("playground");

    let finished = false;

    // ☆ NO 버튼 초기 위치 잡기
    function initNoButton() {
      const rect = noBtn.getBoundingClientRect();
      // YES 버튼 옆에 적절히 배치 (처음엔 relative처럼 보이게)
      noBtn.style.left = "calc(50% + 10px)"; 
      noBtn.style.top = "50%";
      noBtn.style.transform = "translate(0, -50%)";
    }
    window.onload = initNoButton;

    // ☆ 더 똑똑하게 도망가는 로직
    function moveNoButton(e) {
      if (finished) return;

      // 터치든 마우스든 좌표 가져오기
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      const btnRect = noBtn.getBoundingClientRect();
      const btnCenterX = btnRect.left + btnRect.width / 2;
      const btnCenterY = btnRect.top + btnRect.height / 2;

      // 거리 계산
      const dist = Math.hypot(clientX - btnCenterX, clientY - btnCenterY);

      // ☆ 일정 거리(100px) 안에 들어오면 도망
      if (dist < 100) {
        const padding = 50;
        // 화면 안에서 랜덤한 새 좌표 생성
        const newX = Math.random() * (window.innerWidth - btnRect.width - padding * 2) + padding;
        const newY = Math.random() * (window.innerHeight - btnRect.height - padding * 2) + padding;

        // ☆ 텍스트 영역(상단)을 피해서 아래쪽이나 옆쪽으로 더 잘 가도록 유도 가능
        noBtn.style.position = 'fixed'; // ☆ playground 탈출하여 전체 화면 사용
        noBtn.style.left = `${newX}px`;
        noBtn.style.top = `${newY}px`;
        noBtn.style.transform = 'none';
      }
    }

    // ☆ 이벤트 리스너 통합 관리
    document.addEventListener("mousemove", moveNoButton);
    document.addEventListener("touchstart", (e) => {
        // ☆ NO 버튼 근처 터치 시 도망가게 하되, YES 버튼 클릭은 방해 안함
        if (e.target !== yesBtn) {
            moveNoButton(e);
        }
    }, { passive: false });

    // NO 버튼을 운좋게 눌렀을 때를 대비한 방어
    noBtn.addEventListener("click", (e) => {
      if (!finished) {
        e.preventDefault();
        moveNoButton(e);
      }
    });

    yesBtn.addEventListener("click", () => {
      if (finished) return;
      finished = true;

      result.textContent = "히히 고마워! ❤️";
      noBtn.style.display = "none";
      yesBtn.style.transform = "scale(1.2)";
      
      createConfetti();
      sendYesLog();
    });

    function createConfetti() {
      for (let i = 0; i < 70; i++) {
        const dot = document.createElement("div");
        dot.className = "confetti";
        dot.style.left = Math.random() * 100 + "vw";
        dot.style.animationDuration = (Math.random() * 2 + 2) + "s";
        dot.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 4000);
      }
    }

    function sendYesLog() {
      const URL = "https://script.google.com/macros/s/AKfycbxSUaMjaRTMQeomllikrG1egbxXCvaI6FwfYPsoDUSbpGen_Qt177E3H1gEvrUYo7gT/exec";
      // 시트 연동을 포기하셨다고 해서 주소 검증 로직만 유지합니다.
      if (URL.includes("macros/s/")) {
        fetch(URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ event: "YES" }) });
      }
    }
  </script>
</body>
</html>
