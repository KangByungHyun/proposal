<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>❤️</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #fff7fa;
      color: #111;
      touch-action: none; /* ☆ 브라우저 기본 제스처 방지 */
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
    }

    .name { font-size: 32px; font-weight: 700; margin-bottom: 15px; }
    .love { font-size: 24px; font-weight: 600; margin-bottom: 15px; }
    .question { font-size: 36px; font-weight: 800; margin-bottom: 60px; }

    .buttons-area {
      position: relative;
      width: 100%;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 16px 30px;
      min-width: 130px;
      min-height: 60px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
    }

    #yesBtn {
      background: #111;
      color: #fff;
      z-index: 100; /* ☆ 항상 최상단 */
    }

    #noBtn {
      background: #fff;
      color: #111;
      border: 1.5px solid #ddd;
      position: relative;
      z-index: 50;
      transition: left 0.15s ease-out, top 0.15s ease-out; /* ☆ 부드러운 도망 */
    }

    #result { margin-top: 25px; font-size: 30px; font-weight: 700; color: #e11d48; }

    .confetti {
      position: fixed; top: -20px; width: 10px; height: 10px;
      border-radius: 50%; animation: fall linear forwards; z-index: 9999;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="name">지혜야</div>
    <div class="love">많이 많이 사랑해 ❤️</div>
    <div class="question">나랑 결혼 해 줄래?</div>

    <div class="buttons-area">
      <button class="btn" id="yesBtn">YES</button>
      <button class="btn" id="noBtn">NO</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const result = document.getElementById("result");

    let finished = false;
    let isFloating = false;

    // ☆ NO 버튼을 fixed로 전환하여 화면 전체를 쓰게 함
    function makeFloating() {
      if (isFloating) return;
      const rect = noBtn.getBoundingClientRect();
      noBtn.style.position = "fixed";
      noBtn.style.left = rect.left + "px";
      noBtn.style.top = rect.top + "px";
      noBtn.style.margin = "0";
      isFloating = true;
    }

    function moveNoButton(clientX, clientY) {
      if (finished) return;
      makeFloating();

      const btnRect = noBtn.getBoundingClientRect();
      const btnW = btnRect.width;
      const btnH = btnRect.height;
      
      // 중심점 기준 계산
      const centerX = btnRect.left + btnW / 2;
      const centerY = btnRect.top + btnH / 2;

      let dx = centerX - clientX;
      let dy = centerY - clientY;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;

      // ☆ 도망가는 힘 (멀어질수록 약하게, 가까울수록 강하게)
      const force = Math.max(120, 200 - dist); 
      
      let targetX = btnRect.left + (dx / dist) * force;
      let targetY = btnRect.top + (dy / dist) * force;

      const margin = 30; // ☆ 벽과의 최소 여유 공간
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      // ☆ 모서리/벽 탈출 로직: 벽에 박히면 반대편으로 점프
      if (targetX < margin || targetX > screenW - btnW - margin || 
          targetY < margin || targetY > screenH - btnH - margin) {
        
        // ☆ 현재 터치 위치에서 가장 먼 사분면으로 점프
        targetX = clientX > screenW / 2 ? margin : screenW - btnW - margin;
        targetY = clientY > screenH / 2 ? margin : screenH - btnH - margin;
      }

      noBtn.style.left = targetX + "px";
      noBtn.style.top = targetY + "px";
    }

    // ☆ 판정 범위 체크 (근처만 가도 반응)
    function checkEvade(ex, ey) {
      const rect = noBtn.getBoundingClientRect();
      const buffer = 80; // ☆ 감지 반경
      if (ex >= rect.left - buffer && ex <= rect.right + buffer &&
          ey >= rect.top - buffer && ey <= rect.bottom + buffer) {
        moveNoButton(ex, ey);
      }
    }

    // PC 마우스
    document.addEventListener("mousemove", (e) => checkEvade(e.clientX, e.clientY));

    // ☆ 모바일 터치 및 드래깅 (핵심)
    document.addEventListener("touchstart", (e) => {
      if (finished) return;
      const touch = e.touches[0];
      checkEvade(touch.clientX, touch.clientY);
    }, { passive: false });

    document.addEventListener("touchmove", (e) => {
      if (finished) return;
      const touch = e.touches[0];
      // 드래그 중에는 더 민감하게 반응
      const rect = noBtn.getBoundingClientRect();
      if (touch.clientX >= rect.left - 100 && touch.clientX <= rect.right + 100 &&
          touch.clientY >= rect.top - 100 && touch.clientY <= rect.bottom + 100) {
        e.preventDefault(); // 스크롤 방지
        moveNoButton(touch.clientX, touch.clientY);
      }
    }, { passive: false });

    // 실수로 클릭했을 때 대비
    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNoButton(window.innerWidth / 2, window.innerHeight / 2);
    });

    yesBtn.addEventListener("click", () => {
      if (finished) return;
      finished = true;
      result.textContent = "히히 ❤️";
      noBtn.style.display = "none";
      createConfetti();
      sendYesLog();
    });

    function createConfetti() {
      for (let i = 0; i < 50; i++) {
        const dot = document.createElement("div");
        dot.className = "confetti";
        dot.style.left = Math.random() * 100 + "vw";
        dot.style.animationDuration = (Math.random() * 2 + 2) + "s";
        dot.style.background = `hsl(${Math.random() * 360}, 100%, 75%)`;
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 4000);
      }
    }

    function sendYesLog() {
      const URL = "https://script.google.com/macros/s/AKfycbxSUaMjaRTMQeomllikrG1egbxXCvaI6FwfYPsoDUSbpGen_Qt177E3H1gEvrUYo7gT/exec";
      if (!URL.includes("exec")) return;
      fetch(URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ type: "YES" }) });
    }
  </script>
</body>
</html>
