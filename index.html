<script>
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");
  const successMsg = document.getElementById("successMsg");

  // YES 버튼 클릭
  if (yesBtn && successMsg) {
    yesBtn.addEventListener("click", () => {
      successMsg.classList.add("show");
      yesBtn.textContent = "💖 YES 💖";
    });
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function random(min, max) {
    return Math.random() * (max - min) + min;
  }

  function moveNoButton(pointerX, pointerY) {
    const rect = noBtn.getBoundingClientRect();
    const btnW = rect.width;
    const btnH = rect.height;

    const padding = 8;

    // 현재 버튼 중심
    const centerX = rect.left + btnW / 2;
    const centerY = rect.top + btnH / 2;

    // 손가락/마우스 반대 방향 벡터
    let dx = centerX - pointerX;
    let dy = centerY - pointerY;

    if (Math.abs(dx) < 6 && Math.abs(dy) < 6) {
      dx = Math.random() > 0.5 ? 1 : -1;
      dy = Math.random() > 0.5 ? 1 : -1;
    }

    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const nx = dx / dist;
    const ny = dy / dist;

    // 기존 디자인 유지 위해 transform만 사용
    // (position fixed/absolute 절대 안 씀)
    const jumpDistance = Math.max(90, Math.min(170, window.innerWidth * 0.25));

    // 현재 transform 값 저장용 dataset
    const currentX = parseFloat(noBtn.dataset.tx || "0");
    const currentY = parseFloat(noBtn.dataset.ty || "0");

    let targetX = currentX + nx * jumpDistance;
    let targetY = currentY + ny * jumpDistance;

    // 화면 기준으로 transform 범위 제한
    const baseLeft = rect.left - currentX;
    const baseTop = rect.top - currentY;

    const minX = padding - baseLeft;
    const maxX = window.innerWidth - btnW - padding - baseLeft;

    const minY = padding - baseTop;
    const maxY = window.innerHeight - btnH - padding - baseTop;

    // 범위 벗어나면 랜덤 위치
    if (targetX < minX || targetX > maxX || targetY < minY || targetY > maxY) {
      targetX = random(minX, maxX);
      targetY = random(minY, maxY);
    }

    targetX = clamp(targetX, minX, maxX);
    targetY = clamp(targetY, minY, maxY);

    noBtn.dataset.tx = targetX;
    noBtn.dataset.ty = targetY;

    noBtn.style.transition = "transform 0.08s ease-out";
    noBtn.style.transform = `translate(${targetX}px, ${targetY}px) scale(1.04)`;

    clearTimeout(noBtn._bounceTimer);
    noBtn._bounceTimer = setTimeout(() => {
      const x = parseFloat(noBtn.dataset.tx || "0");
      const y = parseFloat(noBtn.dataset.ty || "0");
      noBtn.style.transform = `translate(${x}px, ${y}px) scale(1)`;
    }, 70);
  }

  function pointerNearNo(pointerX, pointerY, extra = 95) {
    const rect = noBtn.getBoundingClientRect();
    return (
      pointerX >= rect.left - extra &&
      pointerX <= rect.right + extra &&
      pointerY >= rect.top - extra &&
      pointerY <= rect.bottom + extra
    );
  }

  // 마우스 hover
  noBtn.addEventListener("mouseenter", (e) => {
    moveNoButton(e.clientX, e.clientY);
  });

  // 클릭 방지
  noBtn.addEventListener("click", (e) => {
    e.preventDefault();
    moveNoButton(window.innerWidth / 2, window.innerHeight / 2);
  });

  // 터치 시작: 근처 누르면 즉시 회피
  document.addEventListener("touchstart", (e) => {
    const touch = e.touches[0];
    if (!touch) return;

    const x = touch.clientX;
    const y = touch.clientY;

    if (pointerNearNo(x, y, 100)) {
      e.preventDefault();
      moveNoButton(x, y);
    }
  }, { passive: false });

  // 터치 드래그: 손가락 안 떼고 계속 따라오면 계속 회피
  document.addEventListener("touchmove", (e) => {
    const touch = e.touches[0];
    if (!touch) return;

    const x = touch.clientX;
    const y = touch.clientY;

    if (pointerNearNo(x, y, 110)) {
      e.preventDefault();
      moveNoButton(x, y);
    }
  }, { passive: false });

  // 화면 크기 바뀌면 transform 값만 안전 보정
  window.addEventListener("resize", () => {
    const rect = noBtn.getBoundingClientRect();
    const btnW = rect.width;
    const btnH = rect.height;
    const padding = 8;

    const currentX = parseFloat(noBtn.dataset.tx || "0");
    const currentY = parseFloat(noBtn.dataset.ty || "0");

    const baseLeft = rect.left - currentX;
    const baseTop = rect.top - currentY;

    const minX = padding - baseLeft;
    const maxX = window.innerWidth - btnW - padding - baseLeft;

    const minY = padding - baseTop;
    const maxY = window.innerHeight - btnH - padding - baseTop;

    const safeX = clamp(currentX, minX, maxX);
    const safeY = clamp(currentY, minY, maxY);

    noBtn.dataset.tx = safeX;
    noBtn.dataset.ty = safeY;
    noBtn.style.transform = `translate(${safeX}px, ${safeY}px)`;
  });
</script>
