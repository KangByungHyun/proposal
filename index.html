<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>❤️</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #fff7fa;
      color: #111;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      touch-action: none; /* ☆ 모바일 스크롤 방지 */
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
    }

    .name {
      font-size: clamp(28px, 8vw, 42px);
      font-weight: 700;
      margin-bottom: 18px;
    }

    .love {
      font-size: clamp(24px, 6.5vw, 34px);
      font-weight: 600;
      margin-bottom: 16px;
    }

    .love .heart {
      display: inline-block;
      animation: beat 1.2s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    .question {
      font-size: clamp(30px, 9vw, 48px);
      font-weight: 800;
      margin-bottom: 60px;
    }

    .buttons-area {
      position: relative;
      width: 100%;
      height: 100px; /* ☆ 초기 위치를 위한 높이 */
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 40px; /* ☆ 초기 버튼 사이 간격 */
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 16px 30px;
      min-width: 130px;
      min-height: 58px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }

    #yesBtn {
      background: #111;
      color: #fff;
      z-index: 10; /* ☆ YES 버튼 클릭 우선순위 */
    }

    #noBtn {
      background: #fff;
      color: #111;
      border: 1.5px solid #ddd;
      position: relative; /* ☆ 처음엔 제자리에 배치 */
      z-index: 5;
    }

    #result {
      margin-top: 20px;
      font-size: 28px;
      font-weight: 700;
      color: #e11d48;
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: fall linear forwards;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="name">지혜야</div>
    <div class="love">많이 많이 사랑해 <span class="heart">❤️</span></div>
    <div class="question">나랑 결혼 해 줄래?</div>

    <div class="buttons-area" id="playground">
      <button class="btn" id="yesBtn">YES</button>
      <button class="btn" id="noBtn">NO</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const result = document.getElementById("result");

    let finished = false;
    let isFloating = false;

    // ☆ NO 버튼을 자유로운 위치로 전환
    function makeFloating() {
      if (isFloating) return;
      const rect = noBtn.getBoundingClientRect();
      noBtn.style.position = "fixed";
      noBtn.style.left = rect.left + "px";
      noBtn.style.top = rect.top + "px";
      noBtn.style.margin = "0";
      noBtn.style.transition = "left 0.1s ease-out, top 0.1s ease-out";
      isFloating = true;
    }

    // ☆ 도망가는 핵심 로직 (원래 로직 복구 및 화면 전체 확장)
    function moveNoButton(clientX, clientY) {
      if (finished) return;
      makeFloating();

      const btnRect = noBtn.getBoundingClientRect();
      const centerX = btnRect.left + btnRect.width / 2;
      const centerY = btnRect.top + btnRect.height / 2;

      let dx = centerX - clientX;
      let dy = centerY - clientY;

      const distance = Math.sqrt(dx * dx + dy * dy) || 1;
      
      // 도망가는 거리 (화면 크기에 비례)
      const moveDist = Math.max(100, window.innerWidth * 0.3);
      
      let targetX = btnRect.left + (dx / distance) * moveDist;
      let targetY = btnRect.top + (dy / distance) * moveDist;

      // ☆ 화면 밖으로 나가지 않게 제한
      const pad = 20;
      targetX = Math.max(pad, Math.min(window.innerWidth - btnRect.width - pad, targetX));
      targetY = Math.max(pad, Math.min(window.innerHeight - btnRect.height - pad, targetY));

      noBtn.style.left = targetX + "px";
      noBtn.style.top = targetY + "px";
    }

    // ☆ YES 버튼 클릭 판정 거리 (근처에만 가도 도망가는 영역)
    function isNearNo(cx, cy, gap = 80) {
      const rect = noBtn.getBoundingClientRect();
      return (
        cx >= rect.left - gap &&
        cx <= rect.right + gap &&
        cy >= rect.top - gap &&
        cy <= rect.bottom + gap
      );
    }

    // PC: 마우스 근처 오면 회피
    document.addEventListener("mousemove", (e) => {
      if (isNearNo(e.clientX, e.clientY)) {
        moveNoButton(e.clientX, e.clientY);
      }
    });

    // ☆ 모바일: 닿는 순간부터 도망 (touchstart)
    document.addEventListener("touchstart", (e) => {
      if (finished) return;
      const touch = e.touches[0];
      if (isNearNo(touch.clientX, touch.clientY, 40)) {
        moveNoButton(touch.clientX, touch.clientY);
      }
    }, { passive: false });

    // ☆ 모바일: 드래그 내내 도망 (touchmove)
    document.addEventListener("touchmove", (e) => {
      if (finished) return;
      const touch = e.touches[0];
      if (isNearNo(touch.clientX, touch.clientY, 60)) {
        e.preventDefault();
        moveNoButton(touch.clientX, touch.clientY);
      }
    }, { passive: false });

    // NO 버튼을 직접 클릭하려 할 때 방어
    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNoButton(window.innerWidth / 2, window.innerHeight / 2);
    });

    yesBtn.addEventListener("click", () => {
      if (finished) return;
      finished = true;

      result.textContent = "히히 ❤️";
      noBtn.style.display = "none";
      yesBtn.disabled = true;
      createConfetti();
    });

    function createConfetti() {
      for (let i = 0; i < 50; i++) {
        const dot = document.createElement("div");
        dot.className = "confetti";
        dot.style.left = Math.random() * 100 + "vw";
        dot.style.animationDuration = (2 + Math.random() * 2) + "s";
        dot.style.background = `hsl(${Math.random() * 360}, 90%, 70%)`;
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 4000);
      }
    }
  </script>
</body>
</html>
