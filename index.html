<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
  />
  <title>❤️</title>
  <meta property="og:title" content="❤️" />
  <meta property="og:description" content=" " />
  <meta property="og:type" content="website" />
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #fff7fa;
      color: #111;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
    }

    .name {
      font-size: clamp(28px, 8vw, 42px);
      font-weight: 700;
      margin-bottom: 18px;
      letter-spacing: -0.02em;
    }

    .love {
      font-size: clamp(24px, 6.5vw, 34px);
      font-weight: 600;
      margin-bottom: 16px;
      line-height: 1.4;
      letter-spacing: -0.02em;
    }

    .love .heart {
      display: inline-block;
      margin-left: 6px;
      animation: beat 1.2s infinite;
    }

    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }

    .question {
      font-size: clamp(30px, 9vw, 48px);
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.03em;
      margin-bottom: 60px;
    }

    .buttons-area {
      position: relative;
      width: 100%;
      height: 180px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 16px 30px;
      min-width: 140px;
      min-height: 58px;
      font-size: clamp(18px, 5vw, 22px);
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
      white-space: nowrap;
    }

    #yesBtn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-120%, -50%);
      background: #111;
      color: #fff;
    }

    #noBtn {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(20%, -50%);
      background: #fff;
      color: #111;
      border: 1.5px solid #ddd;
    }

    #result {
      margin-top: 12px;
      min-height: 40px;
      font-size: clamp(22px, 6vw, 28px);
      font-weight: 700;
      color: #e11d48;
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: fall linear forwards;
      pointer-events: none;
      z-index: 9999;
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0.15;
      }
    }

    @media (max-width: 420px) {
      .buttons-area {
        height: 200px;
      }

      .btn {
        min-width: 128px;
        min-height: 56px;
      }

      #yesBtn {
        transform: translate(-110%, -50%);
      }

      #noBtn {
        transform: translate(10%, -50%);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="name">지혜야</div>
    <div class="love">
      많이 많이 사랑해 <span class="heart">❤️</span>
    </div>
    <div class="question">나랑 결혼 해 줄래?</div>

    <div class="buttons-area" id="playground">
      <button class="btn" id="yesBtn">YES</button>
      <button class="btn" id="noBtn">NO</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const result = document.getElementById("result");
    const playground = document.getElementById("playground");

    let finished = false;

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function moveNoButton() {
      if (finished) return;

      const areaRect = playground.getBoundingClientRect();
      const noRect = noBtn.getBoundingClientRect();
      const yesRect = yesBtn.getBoundingClientRect();

      const yesLeft = yesRect.left - areaRect.left;
      const yesTop = yesRect.top - areaRect.top;
      const yesRight = yesLeft + yesRect.width;
      const yesBottom = yesTop + yesRect.height;

      const margin = 8;
      const maxX = areaRect.width - noRect.width - margin;
      const maxY = areaRect.height - noRect.height - margin;

      let x = 0;
      let y = 0;
      let found = false;

      for (let i = 0; i < 40; i++) {
        const cx = Math.random() * (maxX - margin) + margin;
        const cy = Math.random() * (maxY - margin) + margin;

        const noLeft = cx;
        const noTop = cy;
        const noRight = cx + noRect.width;
        const noBottom = cy + noRect.height;

        const safeGap = 20;

        const overlap = !(
          noRight < yesLeft - safeGap ||
          noLeft > yesRight + safeGap ||
          noBottom < yesTop - safeGap ||
          noTop > yesBottom + safeGap
        );

        if (!overlap) {
          x = cx;
          y = cy;
          found = true;
          break;
        }
      }

      if (!found) {
        x = Math.random() * (maxX - margin) + margin;
        y = Math.random() * (maxY - margin) + margin;
      }

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
      noBtn.style.transform = "none";
    }

    noBtn.addEventListener("touchstart", (e) => {
      e.preventDefault();
      moveNoButton();
    }, { passive: false });

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("pointerenter", moveNoButton);

    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNoButton();
    });

    document.addEventListener("mousemove", (e) => {
      if (finished) return;

      const rect = noBtn.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;

      const dx = e.clientX - centerX;
      const dy = e.clientY - centerY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 100) {
        moveNoButton();
      }
    });

    yesBtn.addEventListener("click", () => {
      finished = true;
      result.textContent = "히히 ❤️";
      noBtn.style.display = "none";
      yesBtn.disabled = true;
      yesBtn.style.opacity = "0.9";
      createConfetti();
    });

    function createConfetti() {
      for (let i = 0; i < 50; i++) {
        const dot = document.createElement("div");
        dot.className = "confetti";
        dot.style.left = Math.random() * 100 + "vw";
        dot.style.animationDuration = (2 + Math.random() * 2) + "s";
        dot.style.width = dot.style.height = (6 + Math.random() * 6) + "px";
        dot.style.background = `hsl(${Math.random() * 360}, 90%, 70%)`;
        document.body.appendChild(dot);

        setTimeout(() => dot.remove(), 4500);
      }
    }
  </script>
</body>
</html>
