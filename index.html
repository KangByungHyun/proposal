<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>❤️</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      background: #fff7fa;
      color: #111;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .wrap {
      width: 100%;
      max-width: 420px;
      text-align: center;
      position: relative;
      pointer-events: none; 
    }

    .wrap * {
      pointer-events: auto;
    }

    .name { font-size: 32px; font-weight: 700; margin-bottom: 15px; }
    .love { font-size: 24px; font-weight: 600; margin-bottom: 15px; }
    .question { font-size: 36px; font-weight: 800; margin-bottom: 60px; }

    .buttons-area {
      position: relative;
      width: 100%;
      height: 80px;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 16px 30px;
      min-width: 130px;
      min-height: 60px;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
    }

    #yesBtn {
      background: #111;
      color: #fff;
      left: calc(50% - 145px);
      z-index: 100;
    }

    #noBtn {
      background: #fff;
      color: #111;
      border: 1.5px solid #ddd;
      left: calc(50% + 15px);
      z-index: 50;
      transition: left 0.12s ease-out, top 0.12s ease-out;
    }

    #result { margin-top: 25px; font-size: 30px; font-weight: 700; color: #e11d48; }

    .version {
      position: fixed;
      right: 15px;
      bottom: 15px;
      font-size: 12px;
      color: #bbb;
    }

    .confetti {
      position: fixed; top: -20px; width: 10px; height: 10px;
      border-radius: 50%; animation: fall linear forwards; z-index: 9999;
    }
    @keyframes fall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="name">지혜야</div>
    <div class="love">많이 많이 사랑해 <span style="display:inline-block; animation: beat 1.2s infinite;">❤️</span></div>
    <div class="question">나랑 결혼 해 줄래?</div>

    <div class="buttons-area">
      <button class="btn" id="yesBtn">YES</button>
      <button class="btn" id="noBtn">NO</button>
    </div>

    <div id="result"></div>
  </div>

  <div class="version">v1.3</div>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const result = document.getElementById("result");

    let finished = false;
    let isFloating = false;

    function makeFloating() {
      if (isFloating) return;
      const rect = noBtn.getBoundingClientRect();
      noBtn.style.position = "fixed";
      noBtn.style.left = rect.left + "px";
      noBtn.style.top = rect.top + "px";
      noBtn.style.margin = "0";
      noBtn.style.transform = "none";
      isFloating = true;
    }

    function moveNoButton(clientX, clientY) {
      if (finished) return;
      makeFloating();

      const btnRect = noBtn.getBoundingClientRect();
      const btnW = btnRect.width;
      const btnH = btnRect.height;
      
      let centerX = btnRect.left + btnW / 2;
      let centerY = btnRect.top + btnH / 2;

      let dx = centerX - clientX;
      let dy = centerY - clientY;

      if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
        dx = (Math.random() - 0.5) * 50;
        dy = (Math.random() - 0.5) * 50;
      }

      const dist = Math.sqrt(dx * dx + dy * dy) || 1;
      const pushDist = 100; 
      
      let targetX = btnRect.left + (dx / dist) * pushDist;
      let targetY = btnRect.top + (dy / dist) * pushDist;

      const pad = 20;
      const screenW = window.innerWidth;
      const screenH = window.innerHeight;

      if (targetX <= pad || targetX >= screenW - btnW - pad) {
        targetY += (Math.random() - 0.5) * 100;
      }
      if (targetY <= pad || targetY >= screenH - btnH - pad) {
        targetX += (Math.random() - 0.5) * 100;
      }

      targetX = Math.max(pad, Math.min(screenW - btnW - pad, targetX));
      targetY = Math.max(pad, Math.min(screenH - btnH - pad, targetY));

      noBtn.style.left = targetX + "px";
      noBtn.style.top = targetY + "px";
    }

    function checkEvade(ex, ey) {
      const rect = noBtn.getBoundingClientRect();
      const buffer = 80;
      if (ex >= rect.left - buffer && ex <= rect.right + buffer &&
          ey >= rect.top - buffer && ey <= rect.bottom + buffer) {
        moveNoButton(ex, ey);
      }
    }

    document.addEventListener("mousemove", (e) => checkEvade(e.clientX, e.clientY));

    document.addEventListener("touchstart", (e) => {
      if (finished) return;
      const touch = e.touches[0];
      checkEvade(touch.clientX, touch.clientY);
    }, { passive: false });

    document.addEventListener("touchmove", (e) => {
      if (finished) return;
      const touch = e.touches[0];
      const rect = noBtn.getBoundingClientRect();
      
      if (touch.clientX >= rect.left - 150 && touch.clientX <= rect.right + 150 &&
          touch.clientY >= rect.top - 150 && touch.clientY <= rect.bottom + 150) {
        if (e.cancelable) e.preventDefault(); 
        moveNoButton(touch.clientX, touch.clientY);
      }
    }, { passive: false });

    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      moveNoButton(window.innerWidth / 2, window.innerHeight / 2);
    });

    yesBtn.addEventListener("click", () => {
      if (finished) return;
      finished = true;
      // ☆ 결과 문구 수정
      result.textContent = "고마워 사랑해 ❤️"; 
      noBtn.style.display = "none";
      createConfetti();
      sendYesLog();
    });

    function createConfetti() {
      for (let i = 0; i < 50; i++) {
        const dot = document.createElement("div");
        dot.className = "confetti";
        dot.style.left = Math.random() * 100 + "vw";
        dot.style.animationDuration = (Math.random() * 2 + 2) + "s";
        dot.style.background = `hsl(${Math.random() * 360}, 100%, 75%)`;
        document.body.appendChild(dot);
        setTimeout(() => dot.remove(), 4000);
      }
    }

    function sendYesLog() {
      const URL = "https://script.google.com/macros/s/AKfycbxSUaMjaRTMQeomllikrG1egbxXCvaI6FwfYPsoDUSbpGen_Qt177E3H1gEvrUYo7gT/exec";
      if (!URL.includes("exec")) return;
      fetch(URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ type: "YES" }) });
    }
  </script>
  <style>
    @keyframes beat {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.12); }
    }
  </style>
</body>
</html>
